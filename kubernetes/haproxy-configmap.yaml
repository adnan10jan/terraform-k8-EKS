apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 1024

    defaults
      log global
      mode http
      option httplog
      option dontlognull
      timeout connect 5000
      timeout client  50000
      timeout server  50000

    frontend http_front
      bind *:80
      default_backend tomcat_backend

    backend tomcat_backend
      balance roundrobin
      # 'tomcat-service' resolves via Kubernetes internal DNS to the Tomcat ClusterIP service
      server tomcat tomcat-service:8080 check
